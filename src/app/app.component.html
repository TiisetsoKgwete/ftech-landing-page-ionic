<ion-app [class.route-transitioning]="isRouteTransitioning">
  <div class="route-glow" [class.active]="isRouteTransitioning"></div>
  <ion-split-pane contentId="main-content" [when]="sidebarWhen" class="slim-shell">
    <ion-menu contentId="main-content" type="overlay" (ionDidOpen)="onMenuOpen()" (ionDidClose)="onMenuClose()">
      <ion-content>
        <div class="menu-header">
          <button class="menu-close-btn" type="button" (click)="menuCtrl.close()" aria-label="Close menu">
            <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
          </button>
        </div>
        <ion-list id="inbox-list">
          @for (p of appPages; track p; let i = $index) {
            <ion-menu-toggle auto-hide="false">
              <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" routerLinkActive="selected" [attr.data-title]="p.title" [attr.aria-label]="p.title" [attr.title]="p.title" tabindex="0">
                <div class="nav-icon-bubble">
                  <ion-icon aria-hidden="true" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon>
                </div>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>

        <div class="theme-toggle-wrap">
          <button class="theme-toggle-btn" type="button" (click)="toggleTheme()" [title]="isDark ? 'Switch to light mode' : 'Switch to dark mode'" aria-label="Toggle theme">
            <div class="nav-icon-bubble theme-bubble">
              <ion-icon [name]="isDark ? 'sunny-outline' : 'moon-outline'" aria-hidden="true"></ion-icon>
            </div>
            <span class="sr-only">Toggle theme</span>
          </button>
        </div>
        <div class="sidebar-collapse-wrap">
          <button class="sidebar-collapse-btn" type="button" (click)="toggleSidebar()" title="Collapse sidebar" aria-label="Collapse sidebar">
            <ion-icon name="chevron-back-outline" aria-hidden="true"></ion-icon>
          </button>
        </div>
      </ion-content>
    </ion-menu>

    <div class="main-frame" id="main-content">
      <nav class="platform-bar">
        <button class="hamburger-btn" [class.force-show]="isSidebarCollapsed" type="button" (click)="openMenu()" aria-label="Toggle menu">
          <ion-icon [name]="isMenuOpen ? 'close-outline' : 'menu-outline'" aria-hidden="true"></ion-icon>
        </button>
        <div class="platform-logo">
          <span class="logo-badge">F</span>
          <span class="logo-wordmark">FTECH</span>
        </div>
        <div class="platform-nav">
          <a class="platform-link" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
          <a class="platform-link" routerLink="/about" routerLinkActive="active">About</a>
          <a class="platform-link" routerLink="/services" routerLinkActive="active">Services</a>
          <a class="platform-link" routerLink="/testimonials" routerLinkActive="active">Testimonials</a>
          <a class="platform-link" routerLink="/faq" routerLinkActive="active">FAQ's</a>
          <a class="platform-link" routerLink="/contact" routerLinkActive="active">Contact Us</a>
        </div>
      </nav>
      <ion-router-outlet></ion-router-outlet>
    </div>

  </ion-split-pane>
</ion-app>
