<ion-content [fullscreen]="false" class="page-shell">
  <div class="notfound-shell">
    <div class="notfound-card glass">
      <div class="error-code">404</div>
      <h1 class="notfound-title">Page Not Found</h1>
      <p class="notfound-subtitle">
        The page you're looking for doesn't exist or may have been moved.<br />
        Let's get you back on track.
      </p>
      <ion-button color="primary" size="large" routerLink="/home">Go to Homepage</ion-button>
    </div>
  </div>
</ion-content>
